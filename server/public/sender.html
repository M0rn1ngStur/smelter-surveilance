<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kamera — Smelter Surveillance</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #161127; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 20px; }
    video { width: 480px; max-width: 90vw; border-radius: 8px; background: #000; }
    .controls { display: flex; gap: 12px; }
    button { padding: 10px 24px; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; transition: opacity 0.2s; }
    button:disabled { opacity: 0.4; cursor: default; }
    #connectBtn { background: #4caf50; color: #fff; }
    #disconnectBtn { background: #f44336; color: #fff; }
    #status { font-size: 14px; color: #aaa; min-height: 20px; }
  </style>
</head>
<body>
  <h2>Nadawca kamery</h2>
  <video id="preview" autoplay muted playsinline></video>
  <div class="controls">
    <button id="connectBtn">Połącz</button>
    <button id="disconnectBtn" disabled>Rozłącz</button>
  </div>
  <div id="status"></div>

  <script>
    const preview = document.getElementById('preview');
    const connectBtn = document.getElementById('connectBtn');
    const disconnectBtn = document.getElementById('disconnectBtn');
    const statusEl = document.getElementById('status');

    let pc = null;
    let stream = null;
    let inputId = null;

    function setStatus(msg) { statusEl.textContent = msg; }

    function waitForIceGathering(pc) {
      return new Promise((resolve) => {
        if (pc.iceGatheringState === 'complete') return resolve();
        const check = () => {
          if (pc.iceGatheringState === 'complete') {
            pc.removeEventListener('icegatheringstatechange', check);
            resolve();
          }
        };
        pc.addEventListener('icegatheringstatechange', check);
        // fallback timeout
        setTimeout(resolve, 5000);
      });
    }

    connectBtn.addEventListener('click', async () => {
      try {
        connectBtn.disabled = true;
        setStatus('Pobieram obraz z kamery...');

        stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        preview.srcObject = stream;

        setStatus('Rejestruję na serwerze...');
        const regRes = await fetch('/connect', { method: 'POST' });
        const { inputId: id, whipUrl, bearerToken } = await regRes.json();
        inputId = id;

        setStatus('Nawiązuję połączenie WebRTC...');
        pc = new RTCPeerConnection({
          iceServers: [{ urls: 'stun:stun.l.google.com:19302' }],
        });

        stream.getVideoTracks().forEach(track => pc.addTrack(track, stream));

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        await waitForIceGathering(pc);

        const whipRes = await fetch(whipUrl, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/sdp',
            'Authorization': `Bearer ${bearerToken}`,
          },
          body: pc.localDescription.sdp,
        });

        if (!whipRes.ok) throw new Error(`WHIP error: ${whipRes.status}`);

        const answerSdp = await whipRes.text();
        await pc.setRemoteDescription({ type: 'answer', sdp: answerSdp });

        disconnectBtn.disabled = false;
        setStatus('Połączono — kamera jest transmitowana');
      } catch (err) {
        setStatus(`Błąd: ${err.message}`);
        connectBtn.disabled = false;
        cleanup();
      }
    });

    disconnectBtn.addEventListener('click', () => {
      disconnect();
      setStatus('Rozłączono');
    });

    function cleanup() {
      if (pc) { pc.close(); pc = null; }
      if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
      preview.srcObject = null;
    }

    function disconnect() {
      cleanup();
      if (inputId) {
        navigator.sendBeacon('/disconnect', new Blob(
          [JSON.stringify({ inputId })],
          { type: 'application/json' }
        ));
        inputId = null;
      }
      connectBtn.disabled = false;
      disconnectBtn.disabled = true;
    }

    window.addEventListener('beforeunload', () => {
      if (inputId) {
        navigator.sendBeacon('/disconnect', new Blob(
          [JSON.stringify({ inputId })],
          { type: 'application/json' }
        ));
      }
    });
  </script>
</body>
</html>
